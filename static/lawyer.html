<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atrium · Lawyer workbench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #F7F6F2; height: 100%; }
    #root { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="root" data-debug-storage-key="lw_debug_ids"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script src="lawyer-data.js"></script>

  <script type="text/babel" src="view-switcher.jsx"></script>
  <script type="text/babel" src="lawyer-app.jsx"></script>
  <script type="text/babel" src="lawyer-artifacts.jsx"></script>

  <script type="text/babel" data-presets="react">
    function apiAuthHeaders(withJson) {
      const headers = {};
      if (withJson) headers['Content-Type'] = 'application/json';
      const token = localStorage.getItem('legal_ai_token');
      if (token) headers['Authorization'] = 'Bearer ' + token;
      return headers;
    }

    // T177 — TRACEABILITY.md panel IDs: panel:chronology|people|entities|synthesis|mindmap|trace-debug:{document_id}
    function specPanelId(kind, docId) {
      return `panel:${kind}:${docId || ''}`;
    }

    function TraceDebugPanel({ docId }) {
      const [open, setOpen] = React.useState(false);
      const [traceJson, setTraceJson] = React.useState(null);
      const [loading, setLoading] = React.useState(false);
      const [error, setError] = React.useState('');

      React.useEffect(() => {
        if (!open || !docId) return;
        let cancelled = false;
        setLoading(true);
        setError('');
        setTraceJson(null);
        fetch('/api/docs/' + encodeURIComponent(docId) + '/trace', { headers: apiAuthHeaders() })
          .then(r => r.ok ? r.json() : Promise.reject(new Error('Trace fetch failed: ' + r.status)))
          .then(data => { if (!cancelled) setTraceJson(data); })
          .catch(err => { if (!cancelled) setError(err.message || 'Failed to load trace'); })
          .finally(() => { if (!cancelled) setLoading(false); });
        return () => { cancelled = true; };
      }, [open, docId]);

      return (
        <details
          open={open}
          onToggle={(e) => setOpen(e.target.open)}
          data-panel-id={specPanelId('trace-debug', docId)}
          style={{ margin: '12px 0 0', fontFamily: 'Inter, system-ui, sans-serif' }}
        >
          <summary style={{ cursor: 'pointer', fontSize: 12, color: '#8A8A82', fontWeight: 600, letterSpacing: '.04em' }}>
            Trace Debug
          </summary>
          <div style={{ marginTop: 8, padding: 12, background: '#FFF', border: '1px solid #E8E6DF', borderRadius: 8 }}>
            {!docId && <div style={{ fontSize: 12, color: '#8A8A82' }}>Select a document to load trace.</div>}
            {docId && loading && <div style={{ fontSize: 12, color: '#8A8A82' }}>Loading trace…</div>}
            {docId && error && <div style={{ fontSize: 12, color: '#A33A2B' }}>{error}</div>}
            {docId && !loading && !error && traceJson != null && (
              <pre style={{
                margin: 0, fontSize: 11, fontFamily: 'JetBrains Mono, monospace',
                whiteSpace: 'pre-wrap', wordBreak: 'break-word', maxHeight: 320, overflow: 'auto', color: '#1B1B19'
              }}>
                {JSON.stringify(traceJson, null, 2)}
              </pre>
            )}
          </div>
        </details>
      );
    }

    const SUGGEST_FOCUS = [
      'Limitation period exposure',
      'Procedural fairness',
      'Class certification',
      'Settlement quantum & releases',
      'Algorithmic decision-making',
      'Unresolved party roles',
    ];

    function UploadModal({ onClose, matterName, debugIds }) {
      const [stage, setStage] = React.useState('idle');  // idle | configure | uploading | done | error
      const [progress, setProgress] = React.useState(0);
      const [filename, setFilename] = React.useState('');
      const [pages, setPages] = React.useState(0);
      const [steer, setSteer] = React.useState('');
      const [focusAreas, setFocusAreas] = React.useState([]);
      const [selectedFile, setSelectedFile] = React.useState(null);
      const [uploadError, setUploadError] = React.useState('');
      const fileInputRef = React.useRef(null);

      const toggleArea = (a) => {
        setFocusAreas(arr => arr.includes(a) ? arr.filter(x => x !== a) : [...arr, a]);
      };

      const resetUpload = () => {
        setStage('idle');
        setProgress(0);
        setFilename('');
        setPages(0);
        setSelectedFile(null);
        setUploadError('');
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      const startAnalysis = async () => {
        if (!selectedFile) return;
        setProgress(10);
        setStage('uploading');
        setUploadError('');
        try {
          const fd = new FormData();
          fd.append('files', selectedFile);
          const uploadHeaders = {};
          const uploadToken = localStorage.getItem('legal_ai_token');
          if (uploadToken) uploadHeaders['Authorization'] = 'Bearer ' + uploadToken;
          const res = await fetch('/api/upload', { method: 'POST', headers: uploadHeaders, body: fd });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err?.detail?.message || `Upload failed: ${res.status}`);
          }
          const data = await res.json();
          setProgress(100);
          setStage('done');
          const newDocId = data.documents?.[0]?.document_id || data.document_id || data.run_id;
          if (newDocId) {
            window._lastUploadedDocId = newDocId;
            localStorage.setItem('op_selected_doc', newDocId);
            window.location.assign('/operator.html#doc=' + encodeURIComponent(newDocId));
          }
        } catch (err) {
          setStage('error');
          setUploadError(err?.message || 'Upload failed');
          console.error('Upload failed:', err);
        }
      };

      return (
        <div
          id="panel-upload-modal"
          data-pane-id="panel:upload-modal"
          onClick={onClose} style={{
          position:'fixed', inset:0, background:'rgba(20,20,18,0.32)', zIndex:50,
          display:'flex', alignItems:'center', justifyContent:'center', padding:40 }}>
          <div onClick={e => e.stopPropagation()} style={{
            background:'#FFF', borderRadius:14, width:520, padding:28,
            boxShadow:'0 30px 80px rgba(0,0,0,.25)', border:'1px solid #E8E6DF',
            fontFamily:'Inter, system-ui, sans-serif', maxHeight:'88vh', overflowY:'auto' }}>
            <div style={{ fontSize:10.5, letterSpacing:'.12em', textTransform:'uppercase',
              color:'#8A8A82', fontWeight:600, marginBottom:6 }}>
              {stage === 'configure' ? 'Review & start analysis' : 'Upload to current matter'}
            </div>
            {debugIds && (
              <div style={{
                fontSize:9,fontFamily:'JetBrains Mono',color:'#8A8A82',
                background:'#F0F0EB',border:'1px solid #E0DDD5',borderRadius:4,
                padding:'2px 6px',marginBottom:8,display:'inline-flex'
              }}>
                panel:upload-modal
              </div>
            )}
            <h2 style={{ fontFamily:'Source Serif Pro, serif', fontSize:22, margin:'0 0 6px', fontWeight:500, letterSpacing:'-0.018em' }}>
              {stage === 'configure'
                ? 'Anything we should focus on?'
                : 'Add a document to ' + (matterName || 'this matter')}
            </h2>
            {stage === 'idle' && (
              <p style={{ margin:'0 0 18px', fontSize:13, color:'#4A4A45', lineHeight:1.5 }}>
                Documents are encrypted in transit and held on-premise. Only canonical names,
                citations and ABNs may leave the network for verification.
              </p>
            )}
            {stage === 'configure' && (
              <p style={{ margin:'0 0 16px', fontSize:13, color:'#4A4A45', lineHeight:1.5 }}>
                You can leave this blank — the system always produces the full set of artifacts.
                Adding focus areas helps the synthesis agents weight specific issues in the memo.
              </p>
            )}

            {stage === 'idle' && (
              <>
                <input
                  type="file"
                  accept=".pdf,.docx,.rtf"
                  style={{ display: 'none' }}
                  ref={fileInputRef}
                  onChange={(e) => {
                    const f = e.target.files?.[0];
                    if (!f) return;
                    setSelectedFile(f);
                    setFilename(f.name);
                    setPages(0);
                    setUploadError('');
                    setStage('configure');
                  }}
                />
                <div onClick={() => fileInputRef.current?.click()} style={{
                  border:'1.5px dashed #E8E6DF', borderRadius:10, padding:'28px 18px', textAlign:'center',
                  cursor:'pointer', transition:'all .12s', marginBottom:14 }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = '#3F5E5A'; e.currentTarget.style.background = '#E6EEEC'; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = '#E8E6DF'; e.currentTarget.style.background = 'transparent'; }}>
                  <div style={{ color:'#3F5E5A', marginBottom: 8 }}>
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                      <path d="M12 4v12m0-12L8 8m4-4l4 4M4 18v2h16v-2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </div>
                  <div style={{ fontSize:13.5, color:'#1B1B19', fontWeight:500 }}>Drop a file here, or click to browse</div>
                  <div style={{ fontSize:11.5, color:'#8A8A82', marginTop:4 }}>PDF · DOCX · RTF · max 5,000 pages · max 500 MB</div>
                </div>
                <div style={{ fontSize:11.5, color:'#8A8A82', display:'flex', alignItems:'flex-start', gap:6 }}>
                  <span style={{ flexShrink:0 }}>ℹ</span>
                  <span>Analysis typically completes in 14–20 hours for documents in the 4,000–5,000 page range. You'll be notified when the chronology and people register are ready (usually within the first 6 hours).</span>
                </div>
              </>
            )}

            {stage === 'configure' && (
              <>
                <div className="lw-up-card">
                  <span className="ic">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
                      <path d="M3 1.5h7l3 3v10A.5.5 0 0112.5 15h-9A.5.5 0 013 14.5v-13A.5.5 0 013.5 1z" stroke="currentColor" strokeWidth="1.3"/>
                      <path d="M10 1.5v3.5h3M5 8h6M5 10.5h6M5 13h4" stroke="currentColor" strokeWidth="1.1" strokeLinecap="round"/>
                    </svg>
                  </span>
                  <div style={{ minWidth:0, flex:1 }}>
                    <div className="nm">{filename}</div>
                    <div className="sub">{pages ? pages.toLocaleString() + ' pages · ' : 'Pages pending backend analysis · '}{selectedFile?.type || 'Document'}</div>
                  </div>
                </div>

                <div className="lw-steer">
                  <label>
                    Focus areas
                    <span className="opt">optional · helps the synthesis agents prioritise</span>
                  </label>
                  <textarea value={steer} onChange={e => setSteer(e.target.value)}
                    placeholder="e.g. We're particularly interested in any clauses dealing with class certification thresholds, and any inconsistency in the dates the algorithm went live. Flag anything that touches on procedural fairness." />
                  <div className="lw-steer-chips">
                    {SUGGEST_FOCUS.map(a => (
                      <button key={a} className={"lw-steer-chip " + (focusAreas.includes(a) ? 'active' : '')}
                              onClick={() => toggleArea(a)}>
                        {focusAreas.includes(a) ? '✓ ' : '+ '}{a}
                      </button>
                    ))}
                  </div>
                  <div className="hint">
                    Whatever you say here is added to the agents' working context.
                    Once the analysis starts, any further changes happen through the chat — ask
                    "rerun the entities pass focusing on…" and the workflow picks it up.
                  </div>
                </div>

                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:18 }}>
                  <button onClick={resetUpload} className="lw-btn ghost" style={{ width:'auto' }}>← Pick a different file</button>
                  <div style={{ display:'flex', gap:8 }}>
                    <button onClick={onClose} className="lw-btn" style={{ width:'auto', padding:'9px 14px' }}>Cancel</button>
                    <button onClick={() => startAnalysis()} className="lw-btn primary" style={{ width:'auto', padding:'9px 16px' }}>Start analysis →</button>
                  </div>
                </div>
              </>
            )}

            {stage === 'uploading' && (
              <div style={{ padding:'6px 0 14px' }}>
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:13, marginBottom:6 }}>
                  <b style={{ fontWeight:500 }}>{filename}</b>
                  <span style={{ fontFamily:'JetBrains Mono', color:'#8A8A82' }}>{progress}%</span>
                </div>
                <div style={{ height:6, background:'#F0EEE7', borderRadius:99, overflow:'hidden' }}>
                  <div style={{ width: progress+'%', height:'100%', background:'#3F5E5A', transition:'width .12s' }} />
                </div>
                <div style={{ fontSize:11.5, color:'#8A8A82', marginTop:8, fontFamily:'JetBrains Mono' }}>
                  Uploading · encrypted · holding text local
                </div>
              </div>
            )}

            {stage === 'done' && (
              <div style={{ padding:'6px 0 4px' }}>
                <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                  <span style={{ width:24, height:24, borderRadius:'50%', background:'#E6F3EA', color:'#2F7A43', display:'inline-flex', alignItems:'center', justifyContent:'center', fontWeight:700 }}>✓</span>
                  <b style={{ fontSize:13, fontWeight:500 }}>Upload complete — analysis queued</b>
                </div>
                <p style={{ margin:'0 0 14px', fontSize:13, color:'#4A4A45', lineHeight:1.55 }}>
                  <b>{filename}</b> has been added to the matter.
                  {(steer.trim() || focusAreas.length > 0) && <> Your focus areas{focusAreas.length>0 && <>
                    {' '}(<i style={{ color:'#3F5E5A' }}>{focusAreas.join(', ')}{steer.trim() && ' + free-text'}</i>)
                  </>}{!focusAreas.length && steer.trim() && <> have been passed to the agents</>}{' '}will be used as context for the synthesis pass.</>}
                  {' '}Chronology and people register typically arrive first, followed by the legal memo in 14–20 hours.
                </p>
                <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
                  <button onClick={onClose} className="lw-btn primary" style={{ width:'auto', padding:'9px 16px' }}>Done</button>
                </div>
              </div>
            )}

            {stage === 'error' && (
              <div style={{ padding:'6px 0 4px' }}>
                <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                  <span style={{ width:24, height:24, borderRadius:'50%', background:'#F8E8E6', color:'#A33A2B', display:'inline-flex', alignItems:'center', justifyContent:'center', fontWeight:700 }}>!</span>
                  <b style={{ fontSize:13, fontWeight:500 }}>Upload failed — please try again</b>
                </div>
                <p style={{ margin:'0 0 14px', fontSize:13, color:'#4A4A45', lineHeight:1.55 }}>
                  {uploadError || 'No error details were returned.'}
                </p>
                <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
                  <button onClick={resetUpload} className="lw-btn primary" style={{ width:'auto', padding:'9px 16px' }}>Retry</button>
                </div>
              </div>
            )}

            {stage === 'idle' && (
              <div style={{ display:'flex', justifyContent:'flex-end', marginTop:14 }}>
                <button onClick={onClose} className="lw-btn" style={{ width:'auto', padding:'8px 14px' }}>Cancel</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      injectLawStyle();
      const [signedIn, setSignedIn] = React.useState(true);
      const [matters, setMatters] = React.useState([]);
      const [matterId, setMatterId] = React.useState('');
      const [docId, setDocId] = React.useState('');
      const [tab, setTab] = React.useState('chronology');
      const [upload, setUpload] = React.useState(false);
      const [tabCounts, setTabCounts] = React.useState({});
      const [debugIds, toggleDebugIds] = useLawyerDebugIds();
      const newestDoc = (docs) => {
        const list = [...(docs || [])];
        list.sort((a, b) => String(b.uploadTs || b.id || '').localeCompare(String(a.uploadTs || a.id || '')));
        return list[0];
      };
      const newestMatterDoc = (matterList) => {
        const pairs = [];
        (matterList || []).forEach(m => (m.docs || []).forEach(d => pairs.push({ matter: m, doc: d })));
        pairs.sort((a, b) => String(b.doc.uploadTs || b.doc.id || '').localeCompare(String(a.doc.uploadTs || a.doc.id || '')));
        return pairs[0];
      };

      const matter = matters.find(m => m.id === matterId) || matters[0] || {};
      const doc = (matter.docs || []).find(d => d.id === docId) || (matter.docs || [])[0] || {};
      const effectiveDocId = doc.id || docId || '';

      // Fetch real artifact counts whenever the active document changes
      React.useEffect(() => {
        setTabCounts({});
        if (!effectiveDocId) return;
        let cancelled = false;
        function updateCounts(data) {
          setTabCounts({
            chronology: data.chronology_event_count,
            entities: data.graph_counts?.entities_total,
            people: data.people_mentioned_count ?? data.individuals_count,
            claims: data.graph_counts?.claims_total,
          });
        }
        fetch('/api/status/' + encodeURIComponent(effectiveDocId), { headers: apiAuthHeaders() })
          .then(r => r.ok ? r.json() : null)
          .then(data => { if (!data || cancelled) return; updateCounts(data); })
          .catch(() => {});
        return () => { cancelled = true; };
      }, [effectiveDocId]);

      // Load real matters from the API; fall back to mock data on error
      React.useEffect(() => {
        fetch('/api/matters', { headers: apiAuthHeaders() })
          .then(r => r.ok ? r.json() : null)
          .then(data => {
            if (data && data.matters && data.matters.length) {
              const sortedMatters = data.matters.map(m => ({
                id: m.id,
                namespace: m.namespace,
                name: m.title || m.id,
                shortName: m.title || m.id,
                client: '',
                practice: '',
                lead: '',
                docs: [{
                  id: m.id,
                  title: m.title || m.id,
                  uploadTs: '',
                }],
                folders: [{ id: 'root', name: 'All documents' }],
              }));
              setMatters(sortedMatters);
              const newest = newestMatterDoc(sortedMatters);
              if (newest) {
                setMatterId(newest.matter.id);
                setDocId(newest.doc.id);
              }
            }
          })
          .catch(() => {});
      }, []);

      // when user clicks a citation chip in chat or memo
      const onCite = (c) => {
        if (c.artifact === 'memo')       setTab('memo');
        else if (c.artifact === 'extrefs')   setTab('extrefs');
        else if (c.artifact === 'chronology') setTab('chronology');
        else if (c.artifact === 'people')     setTab('people');
        else if (c.artifact === 'entities')   setTab('entities');
        else if (c.artifact === 'docrefs')    setTab('docrefs');
        else if (c.artifact === 'synthesis')  setTab('synthesis');
      };

      if (!signedIn) { window.location.href = 'login.html'; return null; }

      return (
        <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
          <LawyerDebugToggle debugIds={debugIds} onToggle={toggleDebugIds} />
          <ViewSwitcher current="lawyer" />
          <div className="lw-root" style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column' }}>
          <div className="lw-app">
            <LawyerHeader matter={matter} doc={doc} onPickMatter={() => {}} onSignOut={() => setSignedIn(false)} />
            <div className="lw-main">
              <LawyerSidebar
                matter={matter}
                matters={matters}
                doc={doc}
                onPickDoc={(d) => { setDocId(d.id); }}
                onPickMatter={(mid) => {
                  const m2 = matters.find(x => x.id === mid);
                  if (!m2) return;
                  setMatterId(mid);
                  const d = newestDoc(m2.docs);
                  if (d) setDocId(d.id);
                  setTab('chronology');
                }}
                onUpload={() => setUpload(true)}
                debugIds={debugIds} />
              <div className="lw-center">
                <LawyerDocHeader doc={doc} matter={matter} />
                <LawyerTabStrip active={tab} onPick={setTab} counts={tabCounts} />
                <div className="lw-canvas">
                  <LawyerArtifactBody tab={tab} onCite={onCite} docId={effectiveDocId} debugIds={debugIds} />
                  <div data-panel-id={specPanelId('mindmap', effectiveDocId)} style={{ display: 'none' }} aria-hidden="true" />
                  <TraceDebugPanel docId={effectiveDocId} />
                </div>
                <LawyerChatDock onCite={onCite} docId={effectiveDocId} currentNamespace={matter.namespace} />
              </div>
            </div>
          </div>
          </div>
          {upload && <UploadModal onClose={() => setUpload(false)} matterName={matter.shortName} debugIds={debugIds} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
