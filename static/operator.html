<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atrium · Operator monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #F4F5F7; }
    #root { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .op-app { flex: 1; min-height: 0; overflow-y: auto; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script>
    // Operator API shim — maps legacy coordination paths to the real graph API.
    (function () {
      const nativeFetch = window.fetch.bind(window);

      function apiAuthHeaders(withJson) {
        const headers = {};
        if (withJson) headers['Content-Type'] = 'application/json';
        const token = localStorage.getItem('legal_ai_token');
        if (token) headers['Authorization'] = 'Bearer ' + token;
        return headers;
      }
      window.apiAuthHeaders = apiAuthHeaders;

      function registerRowsToEvents(data) {
        const rows = (data && data.rows) ? data.rows : [];
        return rows.map(function (row) {
          const e = row.entity || {};
          const text = e.event_description || e.description || e.label || e.name || row.id;
          return {
            id: row.id,
            text: text,
            title: text,
            event_date: e.event_date_iso || e.event_date || '',
            date: e.event_date_iso || e.event_date || '',
            validation_status: e.validation_status || 'real',
            salience_score: row.salience_score,
            provenance: row.provenance || [],
            data_source: 'real',
            conf: row.salience_score,
          };
        });
      }

      function registerRowsToPeople(data) {
        const rows = (data && data.rows) ? data.rows : [];
        return rows.map(function (row) {
          const e = row.entity || {};
          return {
            id: row.id,
            name: e.name || e.display_name || e.label || row.id,
            role: e.role || '',
            validation_status: e.validation_status || 'real',
            salience_score: row.salience_score,
            provenance: row.provenance || [],
            data_source: 'real',
            conf: row.salience_score,
          };
        });
      }

      function registerRowsToEntities(data) {
        const rows = (data && data.rows) ? data.rows : [];
        return rows.map(function (row) {
          const e = row.entity || {};
          const name = e.name || e.display_name || e.label || e.title || row.id;
          return {
            id: row.id,
            name: name,
            canonical: name,
            type: row.type || 'entity',
            validation_status: e.validation_status || 'real',
            salience_score: row.salience_score,
            provenance: row.provenance || [],
            data_source: 'real',
            conf: row.salience_score,
          };
        });
      }

      window.registerRowsToEvents = registerRowsToEvents;
      window.registerRowsToPeople = registerRowsToPeople;
      window.registerRowsToEntities = registerRowsToEntities;

      function jsonResponse(obj, status) {
        return new Response(JSON.stringify(obj), {
          status: status || 200,
          headers: { 'Content-Type': 'application/json' },
        });
      }

      function authInit(input, init) {
        init = init || {};
        const headers = new Headers(init.headers || (input instanceof Request ? input.headers : undefined));
        Object.entries(apiAuthHeaders()).forEach(function (pair) {
          if (!headers.has(pair[0])) headers.set(pair[0], pair[1]);
        });
        return Object.assign({}, init, { headers: headers });
      }

      function mapStageStatus(value) {
        if (!value) return 'queued';
        if (value === 'completed') return 'done';
        if (value === 'running' || value === 'in_progress') return 'running';
        if (value === 'unavailable' || value === 'unknown') return 'unavailable';
        return value;
      }

      function hasNumber(value) {
        return value !== null && value !== undefined && Number.isFinite(Number(value));
      }

      function firstNumber(values) {
        for (let i = 0; i < values.length; i += 1) {
          if (hasNumber(values[i])) return Number(values[i]);
        }
        return null;
      }

      function countStage(id, name, done, total, active) {
        if (!hasNumber(done) || !hasNumber(total) || Number(total) <= 0) {
          return {
            id: id,
            name: name,
            status: 'unavailable',
            pct: 0,
            progressLabel: 'unavailable',
            detail: 'pending telemetry',
          };
        }
        const safeTotal = Math.max(0, Number(total));
        const safeDone = Math.max(0, Math.min(safeTotal, Number(done)));
        const safeActive = Math.max(0, Number(active || 0));
        const progressLabel = safeDone + '/' + safeTotal;
        const status = safeDone >= safeTotal ? 'done' : (safeDone > 0 || safeActive > 0 ? 'running' : 'queued');
        return {
          id: id,
          name: name,
          status: status,
          pct: safeTotal > 0 ? (safeDone / safeTotal) * 100 : 0,
          progressLabel: progressLabel,
          detail: safeActive > 0 ? progressLabel + ' done · ' + safeActive + ' active' : progressLabel + ' done',
        };
      }

      function buildPipeline(status) {
        const gc = status.graph_counts || {};
        const totalChunks = firstNumber([status.total_chunks, status.chunk_count, gc.chunks_expected_total]);
        const parsedChunks = firstNumber([status.chunks_completed, status.parsed_chunks, status.ocr_completed_chunks]);
        const indexedChunks = firstNumber([gc.chunks_total, status.indexed_chunks, status.indexed_chunk_count]);
        return [
          { id: 'ingest', name: 'Document ingest', status: mapStageStatus(status.pipeline_stage), pct: status.pipeline_stage === 'completed' ? 100 : 0 },
          countStage('parse', 'Parse/OCR', parsedChunks, totalChunks, status.chunks_in_progress),
          countStage('index', 'Chunk/Index', indexedChunks, totalChunks, status.indexing_chunks_in_progress),
          { id: 'chronology', name: 'Chronology', status: mapStageStatus(status.chronology_status), pct: status.chronology_status === 'completed' ? 100 : 0, target: 'chronology' },
          { id: 'people', name: 'People', status: mapStageStatus(status.people_mentioned_status), pct: status.people_mentioned_status === 'completed' ? 100 : 0, target: 'people' },
          { id: 'entities', name: 'Entities', status: mapStageStatus(status.individuals_status), pct: status.individuals_status === 'completed' ? 100 : 0, target: 'entities' },
        ];
      }

      function normalizeFleetHardware(fleet) {
        const rawRows = Array.isArray(fleet)
          ? fleet
          : (fleet && (fleet.workers || fleet.hosts || fleet.nodes || fleet.hardware)) || [];
        const rows = Array.isArray(rawRows)
          ? rawRows
          : rawRows && typeof rawRows === 'object'
            ? Object.entries(rawRows).map(function (entry) {
              return Object.assign({ id: entry[0] }, entry[1] || {});
            })
            : [];
        if (!Array.isArray(rows)) return {};
        return rows.reduce(function (acc, row, index) {
          const id = row.id || row.name || row.host || row.label || ('worker_' + (index + 1));
          const status = String(row.status || row.state || '').toLowerCase();
          let ok = null;
          if (typeof row.ok === 'boolean') ok = row.ok;
          else if (typeof row.up === 'boolean') ok = row.up;
          else if (typeof row.available === 'boolean') ok = row.available;
          else if (status) {
            ok = /^(ok|up|online|healthy|ready|running|available)$/.test(status)
              ? true
              : /(down|offline|unreachable|failed|error|unavailable|degraded)/.test(status)
                ? false
                : null;
          }
          acc[id] = {
            label: row.display_name || row.label || row.name || row.host || id,
            model: row.actual_model || row.configured_model || row.model || row.model_name || row.backend_model || '',
            role: row.role || row.kind || 'inference',
            ok: ok,
            status: row.unavailable_reason || row.status || row.state || '',
            running: firstNumber([row.running, row.requests_running, row.active_requests, row.active]),
            waiting: firstNumber([row.waiting, row.queue_depth, row.pending_requests, row.pending]),
            kv_cache_pct: firstNumber([row.gpu_cache_pct, row.kv_cache_pct, row.kv_cache_percent, row.kv_percent]),
            generation_tokens_total: firstNumber([row.generation_tokens_total, row.generated_tokens_total, row.tokens_generated_total]),
            prefix_cache_hit_rate: firstNumber([row.prefix_cache_hit_rate, row.prefix_hit_rate]),
          };
          return acc;
        }, {});
      }

      function buildOperatorPayload(status, allDocs, fleet) {
        const gc = status.graph_counts || {};
        const eventsTotal = gc.events_total != null ? gc.events_total : (status.chronology_event_count || 0);
        const peopleTotal = gc.persons_total != null ? gc.persons_total : (status.people_mentioned_count || 0);
        const entitiesTotal = gc.entities_total != null ? gc.entities_total : 0;
        const activity = Array.isArray(status.activity) ? status.activity
          : Array.isArray(status.events) ? status.events
            : Array.isArray(status.activity_events) ? status.activity_events
              : [];
        return {
          doc: {
            id: status.document_id,
            title: status.label || status.document_id,
            status: status.pipeline_stage || 'unknown',
            pages: status.page_count || gc.page_count || 0,
            docType: 'document',
            uploadTs: status.upload_ts,
          },
          claims: {
            total: gc.claims_total || 0,
            chronology: eventsTotal,
            people: peopleTotal,
            entities: entitiesTotal,
            external_refs: gc.external_sources || gc.evidenced_by_external_edges || 0,
            internal_refs: 0,
            memo: 0,
          },
          claim_breakdown: {
            chronology: { accepted: eventsTotal, disputed: 0, superseded: 0 },
            people: { accepted: peopleTotal, disputed: 0, superseded: 0 },
            entities: { accepted: entitiesTotal, disputed: 0, superseded: 0 },
          },
          pipeline: buildPipeline(status),
          hardware: normalizeFleetHardware(fleet),
          activity: activity,
          all_docs: (allDocs || []).map(function (d) {
            return {
              id: d.document_id,
              title: d.label || d.document_id,
              status: d.pipeline_stage || 'unknown',
              pages: d.page_count || (d.graph_counts && d.graph_counts.page_count) || 0,
              ingested: d.upload_ts,
              pct: d.pipeline_stage === 'completed' ? 100 : 0,
            };
          }),
        };
      }

      function statusToDocumentCounts(status) {
        const gc = status.graph_counts || {};
        const eventsTotal = gc.events_total != null ? gc.events_total : (status.chronology_event_count || 0);
        const peopleTotal = gc.persons_total != null ? gc.persons_total : (status.people_mentioned_count || 0);
        const entitiesTotal = gc.entities_total != null ? gc.entities_total : 0;
        return {
          chronology: { total: eventsTotal, confirmed: eventsTotal, challenged: 0, nominated: 0 },
          people: peopleTotal,
          entities: entitiesTotal,
          entity_claims: { total: gc.claims_total || 0 },
        };
      }

      function eventsToClaims(rows) {
        return rows.map(function (e, index) {
          const prov = (Array.isArray(e.provenance) && e.provenance[0]) || {};
          return {
            id: e.id || ('reg-event-' + index),
            date: e.date || e.event_date || 'undated',
            page: prov.page != null ? prov.page : (prov.page_start != null ? prov.page_start : 0),
            title: e.title || e.text || 'Untitled',
            who: [],
            lane: 'structural',
            conf: e.conf != null ? e.conf : (e.salience_score != null ? e.salience_score : 0.85),
            status: 'accepted',
            dataSource: 'real',
          };
        });
      }

      function peopleToClaims(rows) {
        return rows.map(function (p, index) {
          const prov = (Array.isArray(p.provenance) && p.provenance[0]) || {};
          const page = prov.page != null ? prov.page : prov.page_start;
          return {
            id: p.id || ('reg-person-' + index),
            name: p.name || 'Unknown',
            role: p.role || 'Mentioned person',
            mentions: Array.isArray(p.provenance) ? p.provenance.length : 1,
            conf: p.conf != null ? p.conf : (p.salience_score != null ? p.salience_score : 0.85),
            source: 'Graph register',
            lastSeen: page != null ? ('p. ' + page) : '—',
            status: 'accepted',
            dataSource: 'real',
          };
        });
      }

      function entitiesToClaims(rows) {
        return rows.map(function (e, index) {
          const prov = (Array.isArray(e.provenance) && e.provenance[0]) || {};
          const page = prov.page != null ? prov.page : prov.page_start;
          return {
            id: e.id || ('reg-entity-' + index),
            canonical: e.canonical || e.name || 'Unknown',
            name: e.name || e.canonical,
            type: String(e.type || 'entity').toUpperCase(),
            mentions: Array.isArray(e.provenance) ? e.provenance.length : 1,
            aliases: 0,
            conf: e.conf != null ? e.conf : (e.salience_score != null ? e.salience_score : 0.85),
            asic: null,
            lastSeen: page != null ? ('p. ' + page) : '—',
            status: 'accepted',
            dataSource: 'real',
          };
        });
      }

      function fetchRegister(docId, type, limit) {
        return nativeFetch(
          '/api/registers/' + encodeURIComponent(docId) + '?type=' + encodeURIComponent(type) + '&limit=' + limit,
          { headers: apiAuthHeaders() }
        ).then(function (r) { return r.ok ? r.json() : { rows: [] }; });
      }

      function fetchArtifactPayload(docId, kind) {
        if (kind === 'synthesis-v1' || kind === 'synthesis' || kind === 'memo' || kind === 'extrefs' || kind === 'mindmap') {
          return Promise.resolve({ claims: [], sections: [], total: 0, message: 'Not available in this build' });
        }
        if (kind === 'chronology') {
          return fetchRegister(docId, 'events', 1000).then(function (data) {
            const rows = registerRowsToEvents(data || { rows: [] });
            const claims = eventsToClaims(rows);
            return { claims: claims, total: claims.length };
          });
        }
        if (kind === 'people') {
          return fetchRegister(docId, 'people', 500).then(function (data) {
            const rows = registerRowsToPeople(data || { rows: [] });
            const claims = peopleToClaims(rows);
            return { claims: claims, total: claims.length };
          });
        }
        if (kind === 'entities') {
          return Promise.all([
            fetchRegister(docId, 'organisation', 500),
            fetchRegister(docId, 'legislation', 500),
            fetchRegister(docId, 'authority', 500),
          ]).then(function (parts) {
            const combined = parts.reduce(function (acc, part) { return acc.concat(part.rows || []); }, []);
            const rows = registerRowsToEntities({ rows: combined });
            const claims = entitiesToClaims(rows);
            return { claims: claims, total: claims.length };
          });
        }
        return Promise.resolve({ claims: [], total: 0 });
      }

      function fetchDocumentCounts(docId) {
        return nativeFetch('/api/status/' + encodeURIComponent(docId), { headers: apiAuthHeaders() })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (status) { return status ? statusToDocumentCounts(status) : null; });
      }

      function fetchOperatorStatus(docId) {
        function loadStatus(id) {
          return nativeFetch('/api/status/' + encodeURIComponent(id), { headers: apiAuthHeaders() })
            .then(function (r) { return r.ok ? r.json() : null; });
        }
        function loadList() {
          return nativeFetch('/api/status?limit=50', { headers: apiAuthHeaders() })
            .then(function (r) { return r.ok ? r.json() : { documents: [] }; })
            .then(function (data) { return data.documents || []; });
        }
        function loadFleet() {
          return nativeFetch('/api/fleet', { headers: apiAuthHeaders() })
            .then(function (r) { return r.ok ? r.json() : null; })
            .catch(function () { return null; });
        }
        if (docId) {
          return Promise.all([loadStatus(docId), loadList(), loadFleet()]).then(function (parts) {
            const status = parts[0];
            const docs = parts[1];
            const fleet = parts[2];
            if (!status) return buildOperatorPayload({ document_id: docId }, docs, fleet);
            return buildOperatorPayload(status, docs, fleet);
          });
        }
        return Promise.all([loadList(), loadFleet()]).then(function (parts) {
          const docs = parts[0];
          const fleet = parts[1];
          if (!docs.length) return buildOperatorPayload({ document_id: '' }, [], fleet);
          return loadStatus(docs[0].document_id).then(function (status) {
            return buildOperatorPayload(status || docs[0], docs, fleet);
          });
        });
      }

      const STUB_EMPTY = { events: [] };
      const STUB_RUNS = { runs: [] };
      const STUB_CONVERGENCE = { confirmed: null };
      const NOT_AVAILABLE = { message: 'Not available in this build' };

      window.fetch = function (input, init) {
        init = authInit(input, init);
        const url = typeof input === 'string' ? input : (input && input.url ? input.url : '');
        let parsed;
        try { parsed = new URL(url, window.location.origin); } catch (e) { return nativeFetch(input, init); }
        const path = parsed.pathname;
        const method = ((init && init.method) || 'GET').toUpperCase();

        if (path === '/api/operator-status') {
          const docId = parsed.searchParams.get('doc_id');
          return fetchOperatorStatus(docId).then(function (payload) { return jsonResponse(payload); });
        }

        const countsMatch = path.match(/^\/api\/docs\/([^/]+)\/(counts|artifact-counts)$/);
        if (countsMatch) {
          return fetchDocumentCounts(decodeURIComponent(countsMatch[1]))
            .then(function (payload) { return jsonResponse(payload || {}); });
        }

        const artifactMatch = path.match(/^\/api\/docs\/([^/]+)\/artifacts\/([^/]+)$/);
        if (artifactMatch) {
          const docId = decodeURIComponent(artifactMatch[1]);
          const kind = decodeURIComponent(artifactMatch[2]);
          return fetchArtifactPayload(docId, kind).then(function (payload) { return jsonResponse(payload); });
        }

        if (path.match(/^\/api\/docs\/[^/]+\/mindmap$/)) {
          return Promise.resolve(jsonResponse(Object.assign({ nodes: [], edges: [] }, NOT_AVAILABLE)));
        }

        if (path.match(/^\/api\/docs\/[^/]+\/activity-events/)) {
          return Promise.resolve(jsonResponse(STUB_EMPTY));
        }

        if (path.match(/^\/api\/docs\/[^/]+\/people-mentioned\/runs$/)) {
          return Promise.resolve(jsonResponse(STUB_RUNS));
        }

        if (path.match(/^\/api\/docs\/[^/]+\/claims\/convergence$/)) {
          return Promise.resolve(jsonResponse(STUB_CONVERGENCE));
        }

        if (path.indexOf('reprocess') !== -1 || (method === 'POST' && path.match(/^\/api\/docs\/[^/]+\/[^/]+\/rerun$/))) {
          return Promise.resolve(jsonResponse({ detail: NOT_AVAILABLE }, 501));
        }

        if (path === '/api/llm-metrics' || path.indexOf('/api/llm-telemetry') === 0 || path === '/api/hardware/throughput') {
          return Promise.resolve(jsonResponse({}));
        }

        return nativeFetch(input, init);
      };
    })();
  </script>

  <script type="text/babel" src="direction-a.jsx"></script>
  <script type="text/babel" src="direction-b.jsx"></script>

  <script type="text/babel" data-presets="react">
    // Workspace shell — same component used inside the design-canvas presentation
    // (index.html), here mounted as the standalone operator app.
    function readOperatorRoute() {
      const params = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
      return {
        view: params.get('view') || 'monitor',
        highlight: params.get('highlight') || null,
        docId: params.get('doc') || null,
      };
    }

    function writeOperatorRoute(view, highlight, docId) {
      const params = new URLSearchParams();
      if (view && view !== 'monitor') params.set('view', view);
      if (highlight) params.set('highlight', highlight);
      if (docId) params.set('doc', docId);
      const path = window.location.pathname + window.location.search;
      const next = params.toString() ? path + '#' + params.toString() : path;
      window.history.pushState(null, '', next);
    }

    function StaticGraphWorkbench({ docId, onBack }) {
      const [status, setStatus] = React.useState(null);
      const [failed, setFailed] = React.useState(false);
      React.useEffect(() => {
        setStatus(null);
        setFailed(false);
        if (!docId) return;
        fetch('/api/status/' + encodeURIComponent(docId))
          .then((r) => r.ok ? r.json() : null)
          .then((d) => { if (d) setStatus(d); else setFailed(true); })
          .catch(() => setFailed(true));
      }, [docId]);
      const namespace = status && typeof status.graph_namespace === 'string' && status.graph_namespace.length > 0
        ? status.graph_namespace
        : null;
      const openHref = docId ? '/runs/' + encodeURIComponent(docId) + '/evidence' : '#';
      return (
        <div style={{ minHeight: '100vh', background: '#F7F7F4', color: '#111827', padding: 32, fontFamily: 'Inter, system-ui, sans-serif' }}>
          <button
            type="button"
            onClick={onBack}
            style={{ border: '1px solid #D8D6CE', background: '#fff', borderRadius: 6, padding: '8px 12px', fontSize: 13, cursor: 'pointer' }}
          >
            ← Monitor
          </button>
          <div style={{ marginTop: 24, maxWidth: 760, border: '1px solid #D8D6CE', borderRadius: 8, background: '#fff', padding: 24 }}>
            <div style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 11, letterSpacing: '.08em', textTransform: 'uppercase', color: '#6B7280' }}>
              GraphRAG workbench
            </div>
            <h1 style={{ margin: '8px 0 10px', fontFamily: '"Source Serif Pro", Georgia, serif', fontSize: 30, fontWeight: 500 }}>
              Matter graph
            </h1>
            <p style={{ margin: 0, fontSize: 14, lineHeight: 1.6, color: '#4B5563' }}>
              Static operator entry point. The interactive graph opens from the SPA evidence workbench and uses Core /api/graph.
            </p>
            <div style={{ marginTop: 18, borderTop: '1px solid #ECEBE4', paddingTop: 16, fontFamily: '"JetBrains Mono", monospace', fontSize: 12, color: '#4B5563' }}>
              <div>document: {docId || 'unavailable'}</div>
              <div>graph namespace: {namespace || 'unavailable'}</div>
              <div>state: {failed ? 'status unavailable' : (namespace ? 'real graph available' : 'graph unavailable')}</div>
            </div>
            {namespace ? (
              <a href={openHref} style={{ display: 'inline-block', marginTop: 18, color: '#2C5BE0', fontWeight: 600, fontSize: 13 }}>
                Open full graph workbench →
              </a>
            ) : (
              <div style={{ marginTop: 18, color: '#6B7280', fontSize: 13 }}>
                Graph unavailable until Core reports a graph namespace for this document.
              </div>
            )}
          </div>
        </div>
      );
    }

    function Workspace() {
      const initialRoute = readOperatorRoute();
      const [view, setView] = React.useState(initialRoute.view);
      const [highlight, setHighlight] = React.useState(initialRoute.highlight);
      React.useEffect(() => {
        const syncRoute = () => {
          const route = readOperatorRoute();
          setView(route.view);
          setHighlight(route.highlight);
          if (route.docId) localStorage.setItem('op_selected_doc', route.docId);
        };
        window.addEventListener('hashchange', syncRoute);
        window.addEventListener('popstate', syncRoute);
        return () => {
          window.removeEventListener('hashchange', syncRoute);
          window.removeEventListener('popstate', syncRoute);
        };
      }, []);
      const go = (v, id, docId) => {
        setView(v);
        setHighlight(id || null);
        const nextDocId = docId || localStorage.getItem('op_selected_doc') || null;
        if (nextDocId) localStorage.setItem('op_selected_doc', nextDocId);
        writeOperatorRoute(v, id || null, nextDocId);
        setTimeout(() => setHighlight(null), 2600);
      };
      return (
        <window.NavContext.Provider value={{ go, view, highlight }}>
          {view === 'monitor'
            ? <LatticeDashboard />
            : view === 'evidence'
              ? <StaticGraphWorkbench docId={initialRoute.docId || localStorage.getItem('op_selected_doc')} onBack={() => go('monitor')} />
            : <AtriumDashboard initialTab={view} key={view} />}
        </window.NavContext.Provider>
      );
    }

    function App() {
      return (
        <>
          <ViewSwitcher current="operator" />
          <div className="op-app">
            <Workspace />
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
